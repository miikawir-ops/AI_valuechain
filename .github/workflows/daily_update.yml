name: Daily AI Valuechain Update
 
on:
  schedule:
    - cron: '0 6 * * 1-5'   # 09:00 Helsinki (06:00 UTC) Mon-Fri — morning run
    - cron: '30 20 * * 1-5'  # 23:30 Helsinki (20:30 UTC) Mon-Fri — after US close
  workflow_dispatch:
 
permissions:
  contents: write
 
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install -r requirements.txt
 
      - name: Run agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py --now
 
      - name: Commit and push dashboard
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add ai_chain_report.html scores_history.json next_nvidia_cache.json || true
          git diff --staged --quiet || git commit -m "Daily update: $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push
 


