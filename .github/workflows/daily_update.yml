name: Daily AI Valuechain Update
 
on:
  schedule:
    - cron: '0 6 * * 1-5'  # 06:00 UTC = 09:00 Helsinki (Mon-Fri only)
  workflow_dispatch:         # Allow manual trigger from GitHub UI
 
jobs:
  update:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install -r requirements.txt
 
      - name: Run agent (single report)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash-lite
          DELIVERY_METHOD: console
          REPORT_TIME: "06:00"
        run: python main.py --now
 
      - name: Commit and push dashboard
        run: |
          git config --global user.name 'AI Valuechain Bot'
          git config --global user.email 'bot@users.noreply.github.com'
          git add ai_chain_report.html scores_history.json
          git diff --staged --quiet || git commit -m "Daily update: $(date +'%Y-%m-%d %H:%M UTC')"
          git push